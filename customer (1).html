<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Order Here</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#1a1a1a;color:#fff;min-height:100vh}
.topnav{background:#111;padding:0 16px;height:52px;display:flex;align-items:center;border-bottom:1px solid #333}
.brand{font-size:18px;font-weight:700;color:#ff6b35}
.content{display:flex;min-height:calc(100vh - 52px)}
.menu-panel{flex:1;padding:16px;overflow-y:auto}
.cart-panel{width:320px;background:#111;border-left:1px solid #333;display:flex;flex-direction:column}
.cat-hdr{font-size:10px;font-weight:700;color:#ff6b35;text-transform:uppercase;letter-spacing:1px;margin:14px 0 7px;padding-bottom:5px;border-bottom:1px solid #333}
.cat-hdr:first-child{margin-top:0}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:4px}
.mi{background:#222;border:1.5px solid #333;border-radius:9px;padding:14px 12px;cursor:pointer;transition:all 0.15s}
.mi:hover{border-color:#ff6b35;background:#2a2a2a}
.mi:active{transform:scale(0.97)}
.mi-name{font-size:13px;font-weight:600;color:#fff;margin-bottom:4px}
.mi-price{font-size:12px;color:#ff6b35;font-weight:700}
.cart-hdr{padding:14px 16px;border-bottom:1px solid #333;font-size:14px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
.cart-items{flex:1;overflow-y:auto;padding:10px}
.ci{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #2a2a2a}
.ci-name{flex:1;font-size:13px}
.qb{width:24px;height:24px;border-radius:50%;border:1px solid #444;background:#222;color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qb:hover{background:#333}
.ci-price{font-size:13px;color:#ff6b35;font-weight:600;min-width:48px;text-align:right}
.cart-empty{text-align:center;padding:40px 16px;color:#555;font-size:13px}
.cust-form{padding:12px 16px;border-top:1px solid #333;border-bottom:1px solid #333}
.cust-form label{font-size:11px;color:#888;font-weight:600;display:block;margin-bottom:4px;margin-top:8px}
.cust-form label:first-child{margin-top:0}
.cust-form input{width:100%;background:#1a1a1a;border:1px solid #333;border-radius:6px;padding:8px 10px;font-size:13px;color:#fff}
.cust-form input:focus{outline:none;border-color:#ff6b35}
.cust-form input::placeholder{color:#555}
.cust-form textarea{width:100%;background:#1a1a1a;border:1px solid #333;border-radius:6px;padding:8px 10px;font-size:13px;color:#fff;resize:none;height:70px;font-family:inherit}
.cust-form textarea:focus{outline:none;border-color:#ff6b35}
.cust-form textarea::placeholder{color:#555}
.disc-row{display:flex;gap:6px;margin-top:8px}
.disc-row input{flex:1;background:#1a1a1a;border:1px solid #333;border-radius:6px;padding:8px 10px;font-size:13px;color:#fff;text-transform:uppercase}
.disc-row input::placeholder{text-transform:none;color:#555}
.disc-row input:focus{outline:none;border-color:#ff6b35}
.apply-btn{background:#2a2a2a;border:1px solid #444;color:#ccc;border-radius:6px;padding:8px 12px;font-size:12px;cursor:pointer;white-space:nowrap}
.apply-btn:hover{background:#333}
.disc-msg{font-size:11px;margin-top:5px;padding:5px 8px;border-radius:5px;display:none}
.disc-msg.ok{background:#052e16;color:#22c55e;display:block}
.disc-msg.err{background:#2a0e0e;color:#ef4444;display:block}
.cart-footer{padding:14px 16px}
.tr{display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:4px}
.tr.disc{color:#22c55e}
.tr.total{font-size:14px;font-weight:700;color:#fff;margin-top:6px;padding-top:6px;border-top:1px solid #333}
.place-btn{width:100%;background:#ff6b35;color:#fff;border:none;border-radius:8px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:10px;transition:all 0.15s}
.place-btn:hover{background:#e55a2b}
.place-btn:active{transform:scale(0.98)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#22c55e;color:#fff;padding:14px 24px;border-radius:10px;font-size:14px;font-weight:600;display:none;z-index:999;text-align:center;max-width:320px}
.loading{text-align:center;padding:60px;color:#555}
@media(max-width:600px){.content{flex-direction:column}.cart-panel{width:100%;border-left:none;border-top:1px solid #333}}
</style>
</head>
<body>
<div class="topnav"><div class="brand">&#9654; Order Here</div></div>
<div class="content">
  <div class="menu-panel" id="menu-panel"><div class="loading">Loading menu...</div></div>
  <div class="cart-panel">
    <div class="cart-hdr"><span>Your Order</span><button onclick="clearCart()" style="background:none;border:none;color:#666;font-size:12px;cursor:pointer">Clear</button></div>
    <div class="cart-items" id="cart-items"><div class="cart-empty">Tap items to add them</div></div>
    <div class="cust-form">
      <label>Your Name</label>
      <input type="text" id="cust-name" placeholder="e.g. Mike Smith">
      <label>Phone Number (we'll text you when ready)</label>
      <input type="tel" id="cust-phone" placeholder="e.g. 5745550123">
      <label>Comments / Special Requests (optional)</label>
      <textarea id="cust-comments" placeholder="e.g. No onions, extra sauce, allergy info..."></textarea>
      <label>Discount Code (optional)</label>
      <div class="disc-row">
        <input type="text" id="disc-code" placeholder="Enter code" oninput="this.value=this.value.toUpperCase()">
        <button class="apply-btn" onclick="applyDiscount()">Apply</button>
      </div>
      <div class="disc-msg" id="disc-msg"></div>
    </div>
    <div class="cart-footer">
      <div class="tr"><span>Subtotal</span><span id="subtotal">$0.00</span></div>
      <div class="tr disc" id="disc-row" style="display:none"><span id="disc-label">Discount</span><span id="disc-amt">-$0.00</span></div>
      <div class="tr total"><span>Total</span><span id="cart-total">$0.00</span></div>
      <button class="place-btn" onclick="placeOrder()">Place Order</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCG5nhzdAHBTGg2eXXmhqH8pF8S8qFqM7o",
  authDomain: "duncan--the-buff.firebaseapp.com",
  databaseURL: "https://duncan--the-buff-default-rtdb.firebaseio.com",
  projectId: "duncan--the-buff",
  storageBucket: "duncan--the-buff.firebasestorage.app",
  messagingSenderId: "561324530375",
  appId: "1:561324530375:web:e6927aefd39ac790737ce2"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let menu = [];
let coupons = [];
let cart = [];
let appliedCoupon = null;

// Load menu
onValue(ref(db, 'menu'), snap => {
  const data = snap.val();
  menu = data ? Object.values(data) : [];
  renderMenu();
});

// Load coupons
onValue(ref(db, 'coupons'), snap => {
  const data = snap.val();
  coupons = data ? Object.entries(data).map(([k,v]) => ({fbKey:k,...v})) : [];
});

function renderMenu() {
  const panel = document.getElementById('menu-panel');
  if (!menu.length) { panel.innerHTML = '<div class="loading">Menu coming soon...</div>'; return; }
  panel.innerHTML = '';
  menu.forEach(cat => {
    if (!cat.items || !cat.items.length) return;
    const h = document.createElement('div'); h.className = 'cat-hdr'; h.textContent = cat.label; panel.appendChild(h);
    const g = document.createElement('div'); g.className = 'menu-grid';
    cat.items.forEach(item => {
      const el = document.createElement('div'); el.className = 'mi';
      el.innerHTML = `<div class="mi-name">${item.name}</div><div class="mi-price">$${parseFloat(item.price).toFixed(2)}</div>`;
      el.onclick = () => addToCart(item);
      g.appendChild(el);
    });
    panel.appendChild(g);
  });
}

window.addToCart = function(item) {
  const ex = cart.find(c => c.id === item.id);
  if (ex) ex.qty++; else cart.push({...item, qty: 1});
  renderCart();
}

window.changeQty = function(id, d) {
  const i = cart.findIndex(c => c.id === id);
  if (i === -1) return;
  cart[i].qty += d;
  if (cart[i].qty <= 0) cart.splice(i, 1);
  renderCart();
}

window.clearCart = function() {
  cart = []; appliedCoupon = null;
  document.getElementById('disc-code').value = '';
  document.getElementById('disc-msg').className = 'disc-msg';
  renderCart();
}

function renderCart() {
  const el = document.getElementById('cart-items');
  if (!cart.length) { el.innerHTML = '<div class="cart-empty">Tap items to add them</div>'; updateTotals(); return; }
  el.innerHTML = '';
  cart.forEach(c => {
    const row = document.createElement('div'); row.className = 'ci';
    row.innerHTML = `<div class="ci-name">${c.name}</div><div style="display:flex;align-items:center;gap:6px"><button class="qb" onclick="changeQty('${c.id}',-1)">&#8722;</button><span style="font-size:13px;min-width:16px;text-align:center">${c.qty}</span><button class="qb" onclick="changeQty('${c.id}',1)">+</button></div><div class="ci-price">$${(c.price*c.qty).toFixed(2)}</div>`;
    el.appendChild(row);
  });
  updateTotals();
}

function updateTotals() {
  const sub = cart.reduce((s,c) => s + c.price * c.qty, 0);
  let disc = 0;
  const dr = document.getElementById('disc-row');
  if (appliedCoupon) {
    disc = appliedCoupon.type === 'percent' ? sub * (appliedCoupon.value/100) : Math.min(appliedCoupon.value, sub);
    disc = Math.round(disc*100)/100;
    dr.style.display = 'flex';
    document.getElementById('disc-label').textContent = `${appliedCoupon.code} (${appliedCoupon.type==='percent'?appliedCoupon.value+'% off':'$'+appliedCoupon.value+' off'})`;
    document.getElementById('disc-amt').textContent = `-$${disc.toFixed(2)}`;
  } else { dr.style.display = 'none'; }
  document.getElementById('subtotal').textContent = `$${sub.toFixed(2)}`;
  document.getElementById('cart-total').textContent = `$${Math.max(0,sub-disc).toFixed(2)}`;
  return {sub, disc, total: Math.max(0,sub-disc)};
}

window.applyDiscount = function() {
  const code = document.getElementById('disc-code').value.trim().toUpperCase();
  const msg = document.getElementById('disc-msg');
  if (!code) { msg.className='disc-msg err'; msg.textContent='Enter a code first.'; return; }
  const cp = coupons.find(c => c.code === code);
  if (!cp) { msg.className='disc-msg err'; msg.textContent='Code not found.'; return; }
  if (cp.singleUse && cp.used) { msg.className='disc-msg err'; msg.textContent='This code has already been used.'; return; }
  const sub = cart.reduce((s,c) => s + c.price*c.qty, 0);
  if (cp.minOrder && sub < cp.minOrder) { msg.className='disc-msg err'; msg.textContent=`Minimum order $${cp.minOrder.toFixed(2)} required.`; return; }
  appliedCoupon = cp;
  const disc = cp.type==='percent' ? sub*(cp.value/100) : Math.min(cp.value,sub);
  msg.className='disc-msg ok'; msg.textContent=`Applied! ${cp.type==='percent'?cp.value+'% off':'$'+cp.value.toFixed(2)+' off'} (-$${(Math.round(disc*100)/100).toFixed(2)})`;
  updateTotals();
}

window.placeOrder = async function() {
  const name = document.getElementById('cust-name').value.trim();
  const phone = document.getElementById('cust-phone').value.trim().replace(/\D/g,'');
  const comments = document.getElementById('cust-comments').value.trim();
  if (!name) { alert('Please enter your name'); return; }
  if (!cart.length) { alert('Your cart is empty'); return; }
  const t = updateTotals();
  const order = {
    name, phone, comments, items: cart, subtotal: t.sub, discount: t.disc, total: t.total,
    coupon: appliedCoupon ? appliedCoupon.code : null,
    time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),
    date: new Date().toLocaleDateString(),
    status: 'pending',
    createdAt: serverTimestamp()
  };
  try {
    await push(ref(db, 'orders'), order);
    cart = []; appliedCoupon = null;
    document.getElementById('cust-name').value = '';
    document.getElementById('cust-phone').value = '';
    document.getElementById('cust-comments').value = '';
    document.getElementById('disc-code').value = '';
    document.getElementById('disc-msg').className = 'disc-msg';
    renderCart();
    showToast(`Order placed! We'll text ${phone ? 'you' : name} when it's ready.`);
  } catch(e) { alert('Error placing order. Please try again.'); console.error(e); }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 4000);
}
</script>
</body>
</html>
