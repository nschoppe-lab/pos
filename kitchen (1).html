<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Display</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#1a1a1a;color:#fff;min-height:100vh}
/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:#111;border:1px solid #333;border-radius:12px;padding:32px;width:360px;max-width:100%}
.login-logo{font-size:22px;font-weight:700;color:#ff6b35;margin-bottom:4px}
.login-sub{font-size:13px;color:#888;margin-bottom:24px}
.login-box label{font-size:11px;color:#888;font-weight:600;display:block;margin-bottom:4px;margin-top:14px}
.login-box label:first-of-type{margin-top:0}
.login-box input{width:100%;background:#1a1a1a;border:1px solid #333;border-radius:6px;padding:10px 12px;font-size:14px;color:#fff}
.login-box input:focus{outline:none;border-color:#ff6b35}
.login-box input::placeholder{color:#555}
.login-btn{width:100%;background:#ff6b35;color:#fff;border:none;border-radius:8px;padding:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:18px;transition:all 0.15s}
.login-btn:hover{background:#e55a2b}
.login-err{background:#2a0e0e;color:#ef4444;border-radius:6px;padding:8px 12px;font-size:13px;margin-top:12px;display:none}
/* KITCHEN */
.kitchen{display:none;flex-direction:column;min-height:100vh}
.topbar{background:#111;padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #333;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:12px}
.brand{font-size:16px;font-weight:700;color:#ff6b35}
.open-pill{background:#2a1f0e;color:#f59e0b;font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px}
.hint{font-size:11px;color:#666}
.logout-btn{background:none;border:1px solid #333;color:#888;border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer}
.logout-btn:hover{border-color:#555;color:#ccc}
.orders-grid{flex:1;padding:12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;align-content:start;overflow-y:auto}
.empty{text-align:center;padding:60px;color:#555;grid-column:1/-1}
.oc{background:#1e1e1e;border:1.5px solid #333;border-radius:10px;overflow:hidden;cursor:pointer;user-select:none;transition:border-color 0.15s}
.oc:hover{border-color:#ff6b35}
.oc.flash{border-color:#f59e0b}
.oc.done{border-color:#22c55e;opacity:0.5}
.oc-hdr{padding:10px 14px;background:#252525;display:flex;justify-content:space-between;align-items:center}
.oc-num{font-size:13px;font-weight:700;color:#ff6b35}
.oc-name{font-size:13px;font-weight:600}
.oc-time{font-size:11px;color:#888}
.oc-body{padding:10px 14px}
.oc-line{font-size:12px;color:#ccc;padding:2px 0}
.oc-line span{color:#777}
.oc-total{font-size:12px;font-weight:700;color:#ff6b35;margin-top:6px;padding-top:6px;border-top:1px solid #333}
.oc-foot{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:#1a1a1a;border-top:1px solid #333}
.sbadge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px}
.sbadge.pending{background:#2a1f0e;color:#f59e0b}
.sbadge.done{background:#052e16;color:#22c55e}
.tap-hint{font-size:10px;color:#555}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;z-index:999}
.modal{background:#1e1e1e;border:1px solid #333;border-radius:11px;padding:22px;width:340px;max-width:92vw}
.modal h3{font-size:15px;font-weight:700;margin-bottom:5px}
.modal p{font-size:12px;color:#aaa;margin-bottom:14px}
.mbtns{display:flex;gap:7px;justify-content:flex-end;margin-top:14px}
.mbtn{padding:8px 16px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none}
.mbtn.cancel{background:#333;color:#ccc}
.mbtn.cancel:hover{background:#3a3a3a}
.sms-link{display:block;background:#052e16;border:1px solid #22c55e;color:#22c55e;border-radius:7px;padding:11px;text-decoration:none;font-size:13px;font-weight:600;text-align:center;margin-top:8px}
.sms-link:hover{background:#0a3d1e}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login-wrap">
  <div class="login-box">
    <div class="login-logo">&#9654; Kitchen Display</div>
    <div class="login-sub">Employee login required</div>
    <label>Email</label>
    <input type="email" id="login-email" placeholder="your@email.com">
    <label>Password</label>
    <input type="password" id="login-pass" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- KITCHEN -->
<div class="kitchen" id="kitchen">
  <div class="topbar">
    <div class="topbar-left">
      <div class="brand">&#9654; Kitchen</div>
      <div class="open-pill" id="open-pill">0 open</div>
      <div class="hint">Double-tap to complete</div>
    </div>
    <button class="logout-btn" onclick="doLogout()">Sign out</button>
  </div>
  <div class="orders-grid" id="orders-grid"><div class="empty">No open orders</div></div>
</div>

<div class="modal-bg" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCG5nhzdAHBTGg2eXXmhqH8pF8S8qFqM7o",
  authDomain: "duncan--the-buff.firebaseapp.com",
  databaseURL: "https://duncan--the-buff-default-rtdb.firebaseio.com",
  projectId: "duncan--the-buff",
  storageBucket: "duncan--the-buff.firebasestorage.app",
  messagingSenderId: "561324530375",
  appId: "1:561324530375:web:e6927aefd39ac790737ce2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let orders = {};
let tapTimers = {};

onAuthStateChanged(auth, async user => {
  if (user) {
    // Verify role is kitchen or admin
    const snap = await get(ref(db, `users/${user.uid}/role`));
    const role = snap.val();
    if (role === 'kitchen' || role === 'admin') {
      showKitchen();
    } else {
      await signOut(auth);
      showError('Access denied. Kitchen accounts only.');
    }
  } else {
    document.getElementById('login-wrap').style.display = 'flex';
    document.getElementById('kitchen').style.display = 'none';
  }
});

window.doLogin = async function() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-err');
  errEl.style.display = 'none';
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    errEl.style.display = 'block';
    errEl.textContent = 'Invalid email or password.';
  }
}

window.doLogout = async function() {
  await signOut(auth);
}

function showError(msg) {
  const errEl = document.getElementById('login-err');
  errEl.style.display = 'block';
  errEl.textContent = msg;
}

function showKitchen() {
  document.getElementById('login-wrap').style.display = 'none';
  document.getElementById('kitchen').style.display = 'flex';
  // Listen to orders in real time
  onValue(ref(db, 'orders'), snap => {
    const data = snap.val();
    orders = data || {};
    renderOrders();
  });
}

function renderOrders() {
  const grid = document.getElementById('orders-grid');
  const allOrders = Object.entries(orders).map(([k,v]) => ({fbKey:k,...v}));
  const open = allOrders.filter(o => o.status === 'pending').sort((a,b) => (a.createdAt||0)-(b.createdAt||0));
  const recent = allOrders.filter(o => o.status === 'done').sort((a,b) => (b.createdAt||0)-(a.createdAt||0)).slice(0,6);
  const all = [...open, ...recent];

  document.getElementById('open-pill').textContent = `${open.length} open`;
  if (!all.length) { grid.innerHTML = '<div class="empty">No orders yet</div>'; return; }

  grid.innerHTML = '';
  all.forEach(order => {
    const card = document.createElement('div');
    card.className = 'oc' + (order.status==='done' ? ' done' : '');
    card.dataset.key = order.fbKey;
    card.innerHTML = `
      <div class="oc-hdr">
        <span class="oc-num">#${order.fbKey.slice(-4).toUpperCase()}</span>
        <span class="oc-name">${order.name}</span>
        <span class="oc-time">${order.time||''}</span>
      </div>
      <div class="oc-body">
        ${(order.items||[]).map(i=>`<div class="oc-line"><span>${i.qty}x</span> ${i.name}</div>`).join('')}
        ${order.discount>0?`<div style="font-size:11px;color:#22c55e;margin-top:4px">Disc: -$${parseFloat(order.discount).toFixed(2)}</div>`:''}
        ${order.comments?`<div style="font-size:11px;color:#f59e0b;margin-top:5px;padding:5px 8px;background:#2a1f0e;border-radius:5px">&#128172; ${order.comments}</div>`:''}
        <div class="oc-total">$${parseFloat(order.total).toFixed(2)}</div>
      </div>
      <div class="oc-foot">
        <span class="sbadge ${order.status==='done'?'done':'pending'}">${order.status==='done'?'Done':'In Progress'}</span>
        <span class="tap-hint">${order.status==='done'?'Completed':'Double-tap to complete'}</span>
      </div>`;
    if (order.status !== 'done') {
      card.addEventListener('click', () => handleTap(order.fbKey, order));
    }
    grid.appendChild(card);
  });
}

function handleTap(key, order) {
  if (tapTimers[key]) {
    clearTimeout(tapTimers[key]);
    delete tapTimers[key];
    markDone(key, order);
  } else {
    const card = document.querySelector(`.oc[data-key="${key}"]`);
    if (card) card.classList.add('flash');
    tapTimers[key] = setTimeout(() => {
      delete tapTimers[key];
      const c = document.querySelector(`.oc[data-key="${key}"]`);
      if (c) c.classList.remove('flash');
    }, 600);
  }
}

async function markDone(key, order) {
  await update(ref(db, `orders/${key}`), { status: 'done' });
  if (order.phone) showSMSModal(order);
}

function showSMSModal(order) {
  const msg = encodeURIComponent(`Hi ${order.name}! Your order is ready for pickup!`);
  const href = `sms:${order.phone}?body=${msg}`;
  showModal(`<h3 style="color:#22c55e">Order done!</h3><p>Send completion text to <strong style="color:#fff">${order.name}</strong> at ${fmtPhone(order.phone)}</p><a href="${href}" class="sms-link" onclick="closeModal()">&#128172; Text "Order Ready" to ${order.name}</a><div style="font-size:10px;color:#555;text-align:center;margin-top:6px">Opens your SMS app with message pre-filled</div><div class="mbtns"><button class="mbtn cancel" onclick="closeModal()">Skip</button></div>`);
}

function fmtPhone(p) { return p && p.length===10 ? `(${p.slice(0,3)}) ${p.slice(3,6)}-${p.slice(6)}` : p; }

window.showModal = function(html) { document.getElementById('modal-content').innerHTML=html; document.getElementById('modal').style.display='flex'; }
window.closeModal = function() { document.getElementById('modal').style.display='none'; }
</script>
</body>
</html>
